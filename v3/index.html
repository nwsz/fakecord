<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fakecord - nwsz</title>
    <link rel="icon" type="image/png" href="https://www.transparentpng.com/download/emoticons/thinking-blue-emoticons-hd-transparent-1b3uLJ.png">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nordicalls.github.io/hub/">
    <meta property="og:title" content="nwsfuz">
    <meta property="og:description" content="Hey, I'm nwsfuz, (aka nordicalls) - come checkout my portfolio!">
    <meta name="theme-color" content="#030303">

    <meta name="twitter:title" content="nwsfuz">
    <meta name="twitter:description" content="Hey, I'm nwsfuz, (aka nordicalls) - come checkout my portfolio!">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Premium SaaS UI Colors */
            --bg-app: #09090b;
            --bg-sidebar: #121214;
            --panel-bg: #18181b;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --brand: #5865f2;
            --brand-hover: #4752c4;
            --danger: #ef4444;
            
            /* Discord specific colors */
            --discord-bg: #313338;
            --discord-text: #dbdee1;
            --discord-muted: #949ba4;
            --mention-bg: rgba(240, 178, 50, 0.1);
            --mention-border: #f0b232;
            --mention-badge-bg: rgba(88, 101, 242, 0.3);
            --mention-badge-text: #c9cdfb;
            --link-color: #00a8fc;
            --embed-bg: #2b2d31;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); overflow: hidden; }

        /* Custom Scrollbar for sleekness */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* --- REDESIGNED SAAS SIDEBAR --- */
        #sidebar { 
            width: 380px; 
            background: rgba(18, 18, 20, 0.95); 
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
            box-shadow: 4px 0 24px rgba(0,0,0,0.4);
        }
        
        .sidebar-header { 
            padding: 24px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; top: 0; 
            background: var(--bg-sidebar); 
            z-index: 11; 
        }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
        
        .sidebar-content { 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            overflow-y: auto; 
        }

        .panel-section { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .panel-label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            display: flex; 
            align-items: center;
            justify-content: space-between;
        }

        /* Inputs & Buttons */
        button, select, input[type="text"], input[type="color"] { 
            width: 100%; 
            background: var(--bg-app); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500;
            font-family: inherit; 
            transition: all 0.2s ease; 
            outline: none; 
        }
        
        input[type="color"] { padding: 4px 8px; cursor: pointer; height: 38px; }
        input[type="text"]:focus, select:focus { border-color: var(--text-muted); box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }
        
        button { cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { border-color: var(--text-muted); }
        button.primary { background: var(--text-main); color: var(--bg-app); border-color: var(--text-main); font-weight: 600; }
        button.primary:hover { background: #e4e4e7; border-color: #e4e4e7; }
        button.discord-btn { background: var(--brand); color: white; border-color: var(--brand); }
        button.discord-btn:hover { background: var(--brand-hover); }
        button.danger { color: #fca5a5; background: rgba(239, 68, 68, 0.1); border-color: transparent; }
        button.danger:hover { background: rgba(239, 68, 68, 0.2); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group { display: flex; gap: 8px; align-items: center; }

        /* --- WORKSPACE --- */
        #workspace { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            overflow-y: auto; 
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%); 
        }
        
        #export-container { 
            width: 100%; 
            max-width: 800px; 
            background: var(--discord-bg); 
            border-radius: 8px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            font-family: 'gg sans', 'Helvetica Neue', sans-serif; 
            color: var(--discord-text); 
            padding: 16px 0; 
            transition: background 0.3s ease;
        }

        /* --- DISCORD STYLES --- */
        .message-block { padding: 2px 0; position: relative; border-left: 2px solid transparent; }
        .message-block:hover { background: rgba(255,255,255,0.02); }
        .message-block.selected::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 1px dashed rgba(255,255,255,0.2); pointer-events: none; }
        .message-block.pinged { background: var(--mention-bg); border-left-color: var(--mention-border); }
        
        .reply-context { display: flex; align-items: center; margin-left: 56px; margin-bottom: 4px; position: relative; font-size: 0.875rem; color: var(--discord-muted); }
        .reply-context::before { content: ""; position: absolute; top: 50%; right: 100%; bottom: 0; left: -36px; margin-right: 4px; border-left: 2px solid #4e5058; border-top: 2px solid #4e5058; border-top-left-radius: 6px; }
        .reply-avatar { width: 16px; height: 16px; border-radius: 50%; margin-right: 4px; object-fit: cover; }
        
        .main-msg { display: flex; padding: 2px 16px; position: relative; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; flex-shrink: 0; object-fit: cover; }
        .content { width: 100%; }
        .user-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .username { font-weight: 500; font-size: 1rem; color: #fff; }
        .timestamp { font-size: 0.75rem; color: var(--discord-muted); }
        .role-icon { width: 20px; height: 20px; object-fit: contain; }
        
        .bot-tag { background: var(--brand); color: white; font-size: 10px; font-weight: 600; padding: 1px 4px; border-radius: 3px; display: inline-flex; align-items: center; gap: 2px; }
        .bot-tag svg { width: 10px; height: 10px; }

        .text-body { line-height: 1.375rem; word-break: break-word; outline: none; min-height: 1.375rem; }
        
        /* FIXED: Sub-message padding aligns perfectly with the text-body above it */
        .sub-message { padding: 2px 16px 2px 72px; position: relative; display: flex; align-items: flex-start; }
        .remove-line { position: absolute; right: 16px; top: 2px; background: var(--danger); color: white; border: none; border-radius: 4px; width: 20px; height: 20px; display: none; cursor: pointer; align-items: center; justify-content: center; font-size: 14px; padding: 0; z-index: 10; }
        .sub-message:hover .remove-line { display: flex; }

        /* Rich Content */
        .mention { background: var(--mention-badge-bg); color: var(--mention-badge-text); padding: 0 4px; border-radius: 3px; font-weight: 500; outline: none; display: inline-block; cursor: pointer; }
        .mention:hover { background: var(--brand); color: white; }
        .discord-link { color: var(--link-color); text-decoration: none; outline: none; cursor: pointer; }
        .discord-link:hover { text-decoration: underline; }
        
        .attachment-container { margin-top: 4px; margin-left: 72px; border-radius: 8px; overflow: hidden; max-width: 400px; position: relative; display: inline-block; }
        .attachment-container img { width: 100%; height: auto; display: block; border-radius: 8px; object-fit: contain; }
        .embed-wrapper { display: flex; margin-top: 4px; margin-left: 72px; margin-bottom: 4px; max-width: 520px; position: relative; }
        .embed-color-pill { width: 4px; background-color: #1e1f22; border-radius: 4px 0 0 4px; flex-shrink: 0; }
        .embed-content { background: var(--embed-bg); padding: 12px 16px; border-radius: 0 4px 4px 0; width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #fff; }
        .embed-author img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .embed-description { font-size: 14px; line-height: 1.125rem; color: var(--discord-text); white-space: pre-wrap; outline: none; }
        
        .remove-embed { position: absolute; right: 8px; top: 8px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 4px; padding: 2px 6px; display: none; cursor: pointer; font-size: 11px; z-index: 10; }
        .embed-wrapper:hover .remove-embed, .attachment-container:hover .remove-embed { display: block; }

        .reactions-row { display: flex; gap: 4px; margin: 4px 0 0 72px; flex-wrap: wrap; }
        .reaction { background: #2b2d31; border: 1px solid transparent; border-radius: 8px; padding: 2px 6px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .reaction.active { background: #373a54; border-color: #5865f2; }
        .plus-reaction { width: 24px; height: 24px; background: #2b2d31; border-radius: 8px; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .reactions-row:has(.reaction) .plus-reaction { display: flex; }

        .hidden { display: none !important; }
        [contenteditable]:empty:before { content: "\FEFF"; }
    </style>
</head>
<body spellcheck="false">

    <div id="sidebar">
        <div class="sidebar-header">
            <h1>nwsz msg faker</h1>
            <button class="primary" style="width: auto; padding: 6px 14px; font-size: 12px;" onclick="exportImage()">
                Export PNG
            </button>
        </div>

        <div class="sidebar-content">
            
            <div class="panel-section">
                <div class="panel-label">Global Environment</div>
                <div class="input-group">
                    <span style="font-size: 12px; color: var(--text-muted); width: 100px;">Background:</span>
                    <input type="color" id="bgColor" value="#313338" oninput="changeBackground(this.value)">
                </div>
                <div class="btn-grid">
                    <button class="discord-btn" onclick="addBlock()">+ Add Message</button>
                    <button id="dragBtn" onclick="toggleSort()">Reorder UI</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-label">Selected Message <span style="font-weight: normal; color: #5865f2;">(Click to edit)</span></div>
                <button class="primary" onclick="addFollowUp()">+ Add Follow-up Text</button>
                <div class="btn-grid">
                    <button onclick="insertMention()">Add @Ping</button>
                    <button onclick="insertLink()">Add Link</button>
                </div>
                <button onclick="addReaction()">Add Reaction</button>
                <button onclick="togglePingBG()">Toggle Highlight (Ping)</button>
            </div>

            <div class="panel-section">
                <div class="panel-label">Identity & Roles</div>
                <input type="text" placeholder="Gradient Role (e.g. #ff0000, #0000ff)" oninput="applyGradientColor(this.value)">
                <input type="text" placeholder="Solid Name Color (Hex)" oninput="applyColor(this.value)">
                
                <div class="btn-grid">
                    <button onclick="triggerFile('avatar')">Change PFP</button>
                    <button onclick="triggerFile('role')">Role Icon</button>
                </div>
                <div class="btn-grid">
                    <button onclick="toggleVisibility('.role-icon')">Toggle Role</button>
                    <button onclick="toggleVisibility('.bot-tag')">Toggle Bot</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-label">Rich Media Attachments</div>
                <button onclick="triggerFile('attachment')">Upload Image Attachment</button>
                <button onclick="insertEmbed()">Inject Log Embed</button>
            </div>

            <button class="danger" onclick="deleteBlock()">Delete Selected Message</button>
        </div>

        <input type="file" id="fileUpload" class="hidden" onchange="handleFile(this)" accept="image/*">
    </div>

    <div id="workspace">
        <div id="export-container">
            <div class="message-block selected" onclick="selectBlock(this)">
                <div class="reply-context hidden">
                    <img src="https://via.placeholder.com/16" class="reply-avatar">
                    <span class="reply-name" contenteditable="true">@User</span>
                    <span class="reply-text" contenteditable="true">Preview text...</span>
                </div>
                <div class="main-msg">
                    <img src="https://i.imgur.com/8Km9tLL.png" class="avatar">
                    <div class="content">
                        <div class="user-header">
                            <span class="username" contenteditable="true">nwsz</span>
                            <span class="bot-tag hidden"><svg viewBox="0 0 16 16"><path fill="currentColor" d="M7.4 11.17l4-4.17-1.4-1.42-2.6 2.75-1.4-1.4-1.4 1.4z"/></svg><span contenteditable="true">BOT</span></span>
                            <img src="https://i.imgur.com/v8tTj9V.png" class="role-icon hidden">
                            <span class="timestamp" contenteditable="true">Today at 21:25</span>
                        </div>
                        <div class="text-body" contenteditable="true">Click the chat to edit message content!</div>
                    </div>
                </div>
                <div class="media-anchor"></div>
                <div class="reactions-row"><div class="plus-reaction">...</div></div>
            </div>
        </div>
    </div>

    <script>
        let currentBlock = document.querySelector('.message-block');
        let uploadTarget = 'avatar';
        let sortable = null;
        const baseHTML = currentBlock.cloneNode(true);

        function selectBlock(el) {
            if (document.body.classList.contains('sorting')) return;
            document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            currentBlock = el;
        }

        // --- NEW FEATURES ---
        function changeBackground(hex) {
            document.getElementById('export-container').style.backgroundColor = hex;
        }

        function applyGradientColor(val) {
            const name = currentBlock.querySelector('.username');
            if(val.trim() === '') {
                name.style.background = 'none';
                name.style.webkitTextFillColor = 'initial';
                return;
            }
            name.style.background = `linear-gradient(90deg, ${val})`;
            name.style.webkitBackgroundClip = 'text';
            name.style.webkitTextFillColor = 'transparent';
        }

        function applyColor(val) {
            const name = currentBlock.querySelector('.username');
            name.style.background = 'none'; // Clear gradient if solid is typed
            name.style.webkitTextFillColor = 'initial';
            name.style.color = val; 
        }

        // --- CORE FUNCTIONS ---
        function toggleSort() {
            const btn = document.getElementById('dragBtn');
            const isSorting = document.body.classList.toggle('sorting');
            btn.style.background = isSorting ? '#3f3f46' : '';
            btn.innerText = isSorting ? 'Done Reordering' : 'Reorder UI';
            if(isSorting) document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            else selectBlock(currentBlock);
            if (isSorting) sortable = new Sortable(document.getElementById('export-container'), { animation: 150 });
            else if (sortable) sortable.destroy();
        }

        function addBlock() {
            const clone = baseHTML.cloneNode(true);
            clone.classList.remove('selected');
            document.getElementById('export-container').appendChild(clone);
            selectBlock(clone);
        }

        // FIXED FOLLOW-UP NESTING
        function addFollowUp() {
            const sub = document.createElement('div');
            sub.className = 'sub-message';
            sub.innerHTML = `<div class="text-body" contenteditable="true">Consecutive message line...</div><button class="remove-line" onclick="this.parentElement.remove()">×</button>`;
            // Inserted directly into the block, before the media anchor. This makes the 72px left padding align perfectly.
            currentBlock.insertBefore(sub, currentBlock.querySelector('.media-anchor'));
        }

        function deleteBlock() {
            if (document.querySelectorAll('.message-block').length > 1) {
                const next = currentBlock.nextElementSibling || currentBlock.previousElementSibling;
                currentBlock.remove();
                selectBlock(next);
            }
        }

        function toggleVisibility(selector) { currentBlock.querySelector(selector).classList.toggle('hidden'); }
        function togglePingBG() { currentBlock.classList.toggle('pinged'); }
        
        function insertMention() { currentBlock.querySelector('.main-msg .text-body').innerHTML += ` <span class="mention" contenteditable="true">@User</span>&nbsp;`; }
        function insertLink() { currentBlock.querySelector('.main-msg .text-body').innerHTML += ` <a class="discord-link" contenteditable="true" href="#">https://discord.com</a>&nbsp;`; }

        function addReaction() {
            const row = currentBlock.querySelector('.reactions-row');
            const chip = document.createElement('div');
            chip.className = 'reaction';
            chip.onclick = (e) => { e.stopPropagation(); chip.classList.toggle('active'); };
            chip.innerHTML = `<span contenteditable="true">🔥</span><span class="reaction-count" contenteditable="true">1</span>`;
            row.prepend(chip);
        }

        // --- MEDIA & EXPORT ---
        function triggerFile(target) { uploadTarget = target; document.getElementById('fileUpload').click(); }

        function handleFile(input) {
            if (!input.files || !input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                if (uploadTarget === 'attachment') {
                    const wrap = document.createElement('div');
                    wrap.className = 'attachment-container';
                    wrap.innerHTML = `<button class="remove-embed" onclick="this.parentElement.remove()">Remove</button><img src="${e.target.result}">`;
                    currentBlock.querySelector('.media-anchor').appendChild(wrap);
                } else {
                    let selector = '.avatar';
                    if (uploadTarget === 'reply') selector = '.reply-avatar';
                    if (uploadTarget === 'role') selector = '.role-icon';
                    if (uploadTarget === 'embed-author') selector = '.embed-author img';
                    const imgElement = currentBlock.querySelector(selector);
                    if(imgElement) { imgElement.src = e.target.result; imgElement.classList.remove('hidden'); }
                }
            };
            reader.readAsDataURL(input.files[0]);
            input.value = ''; 
        }

        function insertEmbed() {
            const embed = document.createElement('div');
            embed.className = 'embed-wrapper';
            embed.innerHTML = `
                <div class="embed-color-pill"></div>
                <div class="embed-content">
                    <button class="remove-embed" onclick="this.parentElement.parentElement.remove()">Remove</button>
                    <div class="embed-author">
                        <img src="https://i.imgur.com/8Km9tLL.png" onclick="uploadTarget='embed-author'; document.getElementById('fileUpload').click();" style="cursor:pointer;" title="Change icon">
                        <span contenteditable="true">nwsz</span>
                    </div>
                    <div class="embed-description" contenteditable="true"><b>Message sent by</b> <span class="mention">@nwsz</span> <b>edited in</b> <span class="mention"># general</span> . <a class="discord-link">Jump to Message</a>\n\n<b>Before</b>\n:sob:\n\n<b>After</b>\n😭</div>
                </div>
            `;
            currentBlock.querySelector('.media-anchor').appendChild(embed);
        }

        function exportImage() {
            document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            const container = document.getElementById('export-container');
            const originalBg = container.style.backgroundColor;
            
            html2canvas(container, {
                backgroundColor: originalBg || '#313338', scale: 2, useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `discord-mockup-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                selectBlock(currentBlock);
            });
        }
    </script>
</body>
</html>

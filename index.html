<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fakecord - nwsz</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="https://em-content.zobj.net/source/microsoft/379/crocodile_1f40a.png">
    <meta property="og:title" content="fakecord by nwsz" />
    <meta property="og:description" content="fake discord messages & more. by nwsz (nwsfuz)" />
    <meta property="og:url" content="https://nws.qzz.io" />
    <meta property="og:image" content="https://em-content.zobj.net/source/microsoft/379/crocodile_1f40a.png" />
    <meta name="theme-color" content="#142638">

    <style>
        :root {
            /* Studio UI Colors */
            --bg-app: #09090b;
            --bg-sidebar: #18181b;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --brand: #5865f2;
            --brand-hover: #4752c4;
            --danger: #ef4444;
            
            /* Discord specific colors */
            --discord-bg: #313338;
            --discord-text: #dbdee1;
            --discord-muted: #949ba4;
            --mention-bg: rgba(240, 178, 50, 0.1);
            --mention-border: #f0b232;
            --mention-badge-bg: rgba(88, 101, 242, 0.3);
            --mention-badge-text: #c9cdfb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            height: 100vh; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-app); 
            color: var(--text-main); 
            overflow: hidden; 
        }

        /* --- MODERN SIDEBAR --- */
        #sidebar { 
            width: 340px; 
            background: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-section { display: flex; flex-direction: column; gap: 12px; }
        
        .panel-label { 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        /* Form Controls */
        button, select, input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        button { cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }
        button:hover { background: #27272a; }
        
        button.primary { background: var(--text-main); color: var(--bg-app); border-color: var(--text-main); }
        button.primary:hover { background: #e4e4e7; }
        
        button.discord-btn { background: var(--brand); color: white; border-color: var(--brand); }
        button.discord-btn:hover { background: var(--brand-hover); }

        button.danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        button.danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }

        input[type="text"]:focus, select:focus { border-color: var(--text-muted); }
        select { appearance: auto; background: var(--bg-app); cursor: pointer; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* --- CANVAS & EXPORT AREA --- */
        #workspace {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
        }

        /* This is the container that gets exported as an image */
        #export-container {
            width: 100%;
            max-width: 800px;
            background: var(--discord-bg);
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            font-family: 'gg sans', 'Helvetica Neue', sans-serif;
            color: var(--discord-text);
            padding: 16px 0;
        }

        /* --- DISCORD STYLES --- */
        .message-block { padding: 2px 0; position: relative; border-left: 2px solid transparent; }
        .message-block:hover { background: rgba(255,255,255,0.02); }
        
        /* Studio Selection logic */
        .message-block.selected::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px dashed rgba(255,255,255,0.2); pointer-events: none;
        }
        .message-block.pinged { background: var(--mention-bg); border-left-color: var(--mention-border); }
        
        .reply-context { display: flex; align-items: center; margin-left: 56px; margin-bottom: 4px; position: relative; font-size: 0.875rem; color: var(--discord-muted); }
        .reply-context::before { content: ""; position: absolute; top: 50%; right: 100%; bottom: 0; left: -36px; margin-right: 4px; border-left: 2px solid #4e5058; border-top: 2px solid #4e5058; border-top-left-radius: 6px; }
        .reply-avatar { width: 16px; height: 16px; border-radius: 50%; margin-right: 4px; object-fit: cover; }
        
        .main-msg { display: flex; padding: 2px 16px; position: relative; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; flex-shrink: 0; object-fit: cover; }
        .user-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .username { font-weight: 500; font-size: 1rem; color: #fff; }
        .timestamp { font-size: 0.75rem; color: var(--discord-muted); }
        .role-icon { width: 20px; height: 20px; object-fit: contain; }
        
        .bot-tag { background: var(--brand); color: white; font-size: 10px; font-weight: 600; padding: 1px 4px; border-radius: 3px; display: inline-flex; align-items: center; gap: 2px; line-height: 1.3; }
        .bot-tag svg { width: 10px; height: 10px; }

        .text-body { line-height: 1.375rem; word-break: break-word; outline: none; min-height: 1.375rem; width: 100%; }
        .sub-message { padding: 2px 16px 2px 72px; position: relative; display: flex; align-items: flex-start; }
        
        /* Editable Mention Badge */
        .mention { background: var(--mention-badge-bg); color: var(--mention-badge-text); padding: 0 3px; border-radius: 3px; font-weight: 500; outline: none; display: inline-block; }
        .mention:hover { background: var(--brand); color: white; }

        .remove-line { position: absolute; right: 16px; top: 2px; background: var(--danger); color: white; border: none; border-radius: 4px; width: 20px; height: 20px; display: none; cursor: pointer; align-items: center; justify-content: center; font-size: 14px; padding: 0; z-index: 10; }
        .sub-message:hover .remove-line { display: flex; }

        /* Reactions */
        .reactions-row { display: flex; gap: 4px; margin: 4px 0 0 72px; flex-wrap: wrap; }
        .reaction { background: #2b2d31; border: 1px solid transparent; border-radius: 8px; padding: 2px 6px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .reaction.active { background: #373a54; border-color: #5865f2; }
        .plus-reaction { width: 24px; height: 24px; background: #2b2d31; border-radius: 8px; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .reactions-row:has(.reaction) .plus-reaction { display: flex; }

        .hidden { display: none !important; }
        [contenteditable]:empty:before { content: "\FEFF"; }
    </style>
</head>
<body spellcheck="false">

    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Mockup Studio</h1>
            <button class="primary" style="width: auto; padding: 6px 12px; font-size: 12px;" onclick="exportImage()">
                Export PNG
            </button>
        </div>

        <div class="sidebar-content">
            <div class="panel-section">
                <div class="panel-label">Scene Setup</div>
                <select id="templateDropdown" onchange="loadTemplate(this.value)">
                    <option value="custom">Blank Canvas</option>
                    <option value="standard">Standard Chat</option>
                    <option value="bot">Bot Reply</option>
                    <option value="drama">Pinged & Highlighted</option>
                </select>
                <div class="btn-grid">
                    <button class="discord-btn" onclick="addBlock()">+ Add Message</button>
                    <button id="dragBtn" onclick="toggleSort()">Reorder</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-label">Message Content</div>
                <button onclick="addFollowUp()">+ Add Follow-up Text</button>
                <div class="btn-grid">
                    <button onclick="insertMention()">Insert @Ping</button>
                    <button onclick="addReaction()">Add Reaction</button>
                </div>
                <button onclick="togglePingBG()">Toggle Yellow Ping BG</button>
            </div>

            <div class="panel-section">
                <div class="panel-label">User Settings (Selected Block)</div>
                <input type="text" placeholder="Custom Name Color (Hex)" oninput="applyColor(this.value)">
                
                <div class="btn-grid">
                    <button onclick="triggerFile('avatar')">Change PFP</button>
                    <button onclick="triggerFile('role')">Change Role Icon</button>
                </div>
                <div class="btn-grid">
                    <button onclick="toggleVisibility('.role-icon')">Toggle Role</button>
                    <button onclick="toggleVisibility('.bot-tag')">Toggle Bot Tag</button>
                </div>
                
                <div class="panel-label" style="margin-top: 8px;">Reply Header</div>
                <div class="btn-grid">
                    <button onclick="toggleVisibility('.reply-context')">Toggle Reply</button>
                    <button onclick="triggerFile('reply')">Reply PFP</button>
                </div>
            </div>

            <div class="panel-section" style="margin-top: auto;">
                <button class="danger" onclick="deleteBlock()">Delete Selected Block</button>
            </div>
        </div>

        <input type="file" id="fileUpload" class="hidden" onchange="handleFile(this)" accept="image/*">
    </div>

    <div id="workspace">
        <div id="export-container">
            <div class="message-block selected" onclick="selectBlock(this)">
                <div class="reply-context hidden">
                    <img src="https://via.placeholder.com/16" class="reply-avatar">
                    <span class="reply-name" contenteditable="true">@User</span>
                    <span class="reply-text" contenteditable="true">Preview text...</span>
                </div>
                <div class="main-msg">
                    <img src="https://i.imgur.com/8Km9tLL.png" class="avatar">
                    <div class="content" style="width:100%">
                        <div class="user-header">
                            <span class="username" contenteditable="true">nwsz</span>
                            <span class="bot-tag hidden">
                                <svg viewBox="0 0 16 16"><path fill="currentColor" d="M7.4 11.17l4-4.17-1.4-1.42-2.6 2.75-1.4-1.4-1.4 1.4z"/></svg>
                                <span contenteditable="true">APP</span>
                            </span>
                            <img src="https://i.imgur.com/v8tTj9V.png" class="role-icon">
                            <span class="timestamp" contenteditable="true">Today at 21:25</span>
                        </div>
                        <div class="text-body" contenteditable="true">this tool was made by nwsz (nwsfuz)! click to edit text. use the menu on the side for enhanced actions.</div>
                    </div>
                </div>
                <div class="reactions-row"><div class="plus-reaction">...</div></div>
            </div>
        </div>
    </div>

    <script>
        let currentBlock = document.querySelector('.message-block');
        let uploadTarget = 'avatar';
        let sortable = null;
        
        // Save base HTML for infinite cloning
        const baseHTML = currentBlock.cloneNode(true);

        function selectBlock(el) {
            if (document.body.classList.contains('sorting')) return;
            document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            currentBlock = el;
        }

        function toggleSort() {
            const btn = document.getElementById('dragBtn');
            const isSorting = document.body.classList.toggle('sorting');
            btn.style.background = isSorting ? '#3f3f46' : '';
            btn.style.color = isSorting ? '#fff' : '';
            btn.innerText = isSorting ? 'Done Reordering' : 'Reorder';
            
            // Remove selection dashed border while dragging
            if(isSorting) document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            else selectBlock(currentBlock);

            if (isSorting) sortable = new Sortable(document.getElementById('export-container'), { animation: 150 });
            else if (sortable) sortable.destroy();
        }

        function addBlock() {
            const clone = baseHTML.cloneNode(true);
            clone.classList.remove('selected');
            document.getElementById('export-container').appendChild(clone);
            selectBlock(clone);
            clone.scrollIntoView({behavior: "smooth"});
        }

        function addFollowUp() {
            const sub = document.createElement('div');
            sub.className = 'sub-message';
            sub.innerHTML = `
                <div class="text-body" contenteditable="true">New line...</div>
                <button class="remove-line" title="Remove line" onclick="this.parentElement.remove()">×</button>
            `;
            currentBlock.insertBefore(sub, currentBlock.querySelector('.reactions-row'));
        }

        function deleteBlock() {
            const blocks = document.querySelectorAll('.message-block');
            if (blocks.length > 1) {
                const next = currentBlock.nextElementSibling || currentBlock.previousElementSibling;
                currentBlock.remove();
                selectBlock(next);
            }
        }

        function toggleVisibility(selector) { currentBlock.querySelector(selector).classList.toggle('hidden'); }
        function togglePingBG() { currentBlock.classList.toggle('pinged'); }
        
        function insertMention() {
            // Mention span is now contenteditable so the user can change "@User" to "@Admin" etc.
            const targetText = currentBlock.querySelector('.main-msg .text-body');
            targetText.innerHTML += ` <span class="mention" contenteditable="true">@User</span>&nbsp;`;
        }

        function applyColor(val) {
            const name = currentBlock.querySelector('.username');
            name.style.color = val;
        }

        function addReaction() {
            const row = currentBlock.querySelector('.reactions-row');
            const chip = document.createElement('div');
            chip.className = 'reaction';
            chip.onclick = (e) => { e.stopPropagation(); chip.classList.toggle('active'); };
            chip.innerHTML = `<span contenteditable="true">👍</span><span class="reaction-count" contenteditable="true">1</span>`;
            row.prepend(chip);
        }

        // Consolidated Image Upload Logic
        function triggerFile(target) { 
            uploadTarget = target; 
            document.getElementById('fileUpload').click(); 
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    let selector = '.avatar';
                    if (uploadTarget === 'reply') selector = '.reply-avatar';
                    if (uploadTarget === 'role') selector = '.role-icon';
                    
                    const imgElement = currentBlock.querySelector(selector);
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden'); // unhide if it was hidden
                };
                reader.readAsDataURL(input.files[0]);
            }
            input.value = ''; // Reset input
        }

        // Export to High-Res Image
        function exportImage() {
            // Temporarily hide UI elements (like selection dashed borders and remove buttons)
            document.querySelectorAll('.message-block').forEach(b => b.classList.remove('selected'));
            
            const container = document.getElementById('export-container');
            
            html2canvas(container, {
                backgroundColor: '#313338',
                scale: 2, // 2x resolution for crisp text
                useCORS: true // Helps if external images are used
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `discord-mockup-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Restore selection
                selectBlock(currentBlock);
            });
        }

        function loadTemplate(type) {
            const container = document.getElementById('export-container');
            if (type === 'custom') return;
            container.innerHTML = ''; 
            
            if (type === 'standard') {
                addBlock();
                currentBlock.querySelector('.text-body').innerText = "Looks great! When is the release date?";
                addBlock();
                currentBlock.querySelector('.username').innerText = "Developer";
                currentBlock.querySelector('.text-body').innerText = "We're aiming for next Friday.";
            } 
            else if (type === 'bot') {
                addBlock();
                currentBlock.querySelector('.username').innerText = "SystemBot";
                currentBlock.querySelector('.username').style.color = "#5865f2";
                currentBlock.querySelector('.bot-tag').classList.remove('hidden');
                currentBlock.querySelector('.reply-context').classList.remove('hidden');
                currentBlock.querySelector('.text-body').innerText = "Your account has been successfully linked.";
            }
            else if (type === 'drama') {
                addBlock();
                currentBlock.classList.add('pinged');
                currentBlock.querySelector('.username').innerText = "Moderator";
                currentBlock.querySelector('.username').style.color = "#ff4444";
                currentBlock.querySelector('.text-body').innerHTML = `Please review the latest logs, <span class="mention" contenteditable="true">@nws</span>.`;
            }
            document.getElementById('templateDropdown').value = 'custom';
        }
    </script>
</body>
</html>
